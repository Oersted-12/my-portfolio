<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Certificates | Christian Oersted</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .cert-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* Force exactly two columns */
            gap: 1.5rem;
            margin-top: 3rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .cert-card {
            cursor: pointer;
            padding: 1rem;
            transition: var(--transition-smooth);
            height: 380px;
            /* Consistent height for the grid */
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border-radius: 12px;
        }

        .cert-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-cyan);
            background: rgba(0, 242, 255, 0.05);
        }

        .cert-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Shows the FULL certificate without cropping */
            border-radius: 4px;
        }

        /* Responsive: keep 2 columns unless screen is very narrow */
        @media (max-width: 600px) {
            .cert-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition-smooth);
        }

        .back-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-cyan);
            transform: translateX(-5px);
        }

        /* Modal Styles */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 1, 10, 0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .image-modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            border: 3px solid #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4), 0 0 60px rgba(30, 144, 255, 0.4);
            filter: contrast(1.1) brightness(1.1);
        }

        .modal-content::after {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border: 2px solid var(--accent-blue);
            border-radius: 12px;
            opacity: 0.5;
            z-index: -1;
            animation: rotate-ring 15s linear infinite;
            pointer-events: none;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .close-modal:hover {
            color: var(--accent-cyan);
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <div class="background-overlay"></div>
    <div class="stars-container"></div>

    <a href="index.html#certifications" class="back-btn">
        <i data-lucide="arrow-left"></i> Back to Portfolio
    </a>

    <main class="section">
        <div class="container">
            <h2 class="section-title">Sports Certificates</h2>
            <div class="cert-grid">
                <div class="glass-card cert-card" onclick="openModal('assets/Sports/sport1.jpeg')">
                    <img src="assets/Sports/sport1.jpeg" alt="Sports certificate" class="cert-img">
                </div>
                <div class="glass-card cert-card" onclick="openModal('assets/Sports/sport2.jpeg')">
                    <img src="assets/Sports/sport2.jpeg" alt="Sports certificate" class="cert-img">
                </div>
                <div class="glass-card cert-card" onclick="openModal('assets/Sports/sport3.jpeg')">
                    <img src="assets/Sports/sport3.jpeg" alt="Sports certificate" class="cert-img">
                </div>
                <div class="glass-card cert-card" onclick="openModal('assets/Sports/sport4.jpeg')">
                    <img src="assets/Sports/sport4.jpeg" alt="Sports certificate" class="cert-img">
                </div>
            </div>
        </div>
    </main>

    <div id="image-modal" class="image-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modal-img" src="" alt="Certificate Full View">
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Christian Oersted Dominic Jeeva. All rights reserved.</p>
    </footer>

    <script shadow>
        lucide.createIcons();

        // Add star movement
        const starsContainer = document.querySelector('.stars-container');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            star.style.animationDelay = `${Math.random() * 5}s`;
            starsContainer.appendChild(star);
        }

        const modal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-img');
        const closeBtn = document.querySelector('.close-modal');

        function openModal(src) {
            modalImg.src = src;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>

</html>
